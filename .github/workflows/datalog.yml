name: Generate Daily Weather Datalog

on:
  schedule:
    - cron: '5 0 * * *' # Runs daily at 00:05 UTC (approx. 5:35 AM IST)
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Fetch and Format Logs
        run: python fetch_logs.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "Data" ]; then
            git add Data/
            git diff --quiet && git diff --cached --quiet || (git commit -m "Log daily weather notepad for $(date -d 'yesterday' +%F)" && git push)
          else
            echo "No Data folder found (probably no new logs today). Skipping commit."
          fi
